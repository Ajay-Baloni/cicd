server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Vite fingerprints asset filenames (app.4f2a1b.js), so a given URL's
    # contents never change. Cache them aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # index.html must NOT be cached. Its filename is stable but its contents
    # change every deploy — a cached copy would point at asset files that no
    # longer exist, and users would see a blank page until a hard refresh.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Single-page app routing. Without this, refreshing on /notes/123 returns a
    # 404, because no such file exists on disk. This is the nginx equivalent of
    # the CloudFront custom-error-response rule you'll add in Phase 5.
    location / {
        try_files $uri $uri/ /index.html;
    }
}

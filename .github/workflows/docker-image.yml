# ⚠️  SUPERSEDED — kept for reference, rewritten in Phase 2.
#
# This targeted the old single-file app at the repo root. That app has moved
# into backend/, so `npm ci` and `npm test` at the root would now fail, and the
# root docker-compose.yml is the LOCAL DEV stack — deploying it would ship a
# containerised Postgres to production.
#
# The trigger is reduced to manual-only so it no longer fails on every push.
# Phase 2 replaces this with ci.yml (PR checks) and deploy.yml (SHA-tagged
# images, ECR, migrations, blue/green, rollback).

name: Build and push Docker image (superseded)

on:
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ajaybalonii/cicd-test:latest

      - name: Create app directory on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: mkdir -p ~/cicd-app

      - name: Copy docker-compose.yml to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml"
          target: "~/cicd-app"

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/cicd-app
            docker compose pull
            docker compose up -d
